<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學測數理專屬家教網</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="flyout-container">
        <header class="flyout-header">
            <h1>學測數理專屬家教網</h1>
            <p>你的個人化學習儀表板</p>
        </header>
        
        <main class="flyout-content">
            <div class="card">
                <h2>📚 本週重點進度</h2>
                <p>數學：空間向量與矩陣變換</p>
                <p>物理：簡諧運動 (SHM) 觀念解析</p>
            </div>
            
            <div class="card">
                <h2>👨‍🎓 學生專區</h2>
                <p id="user-status">請登入以查看專屬進度與測驗</p>
                
                <button id="login-btn" class="primary-btn">使用 Google 帳號登入</button>
                <button id="logout-btn" class="primary-btn" style="display: none; background-color: #e74c3c;">登出</button>
            </div>
        </main>
    </div>

    <script></script><script type="module" src="app.js"></script>
</body>
</html>
